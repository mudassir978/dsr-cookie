<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSR Test Page</title>

    <script>
    (function () {
        var s = document.createElement('script');
        s.src = 'https://cdn-qa.securiti.xyz/consent/cookie-consent-sdk-loader.js';
        s.setAttribute('data-tenant-uuid', 'a7704d5e-47c2-4322-ab93-32f05a398b96');
        s.setAttribute('data-domain-uuid', '76c9d4e0-96c8-4621-857e-73cef565f3a6');
        s.setAttribute('data-backend-url', 'https://qa.securiti.xyz');
        s.setAttribute('data-skip-css', 'false');
        s.defer = true;
        var parent_node = document.head || document.body;
        parent_node.appendChild(s);
    })()
    </script>
</head>
<body>

    <h1>DSR Test Page</h1>
    <p>Status: Hello World abcd</p>

    <button class="cmp-revoke-consent">Revoke Consent</button>

    <hr>

    <div style="width: 100%; margin-top: 20px;">
        <iframe 
            src="https://dsp-qa.securiti.xyz/dsr-embed/be8970f8-f772-4883-a2c3-eec603ee4dc5" 
            style="border: none; width: 100%; height: 800px;"
            title="DSR Form">
        </iframe>
    </div>

    <script>
    window.addEventListener('message', (event) => {
        if (event.data.sec_signal_identifier === 'sec-dsr-submission-success') {
            // Process message
            if (window.SecuritiSDK && bannerGenerator && (event.data.sec_dsr_data.ticket_type||[]).includes('do-not-sell')) {
                bannerGenerator.setDoNotSellConsent()
            }
        }
    });
    </script>
    
</body>
</html>
